services:
  tiago_base:
    extends:
      file: .compose_templates.yml
      service: .tiago_sim
    # Start pose for drive & place task
    command: >
      ros2 launch rwu_tiago_bringup sim_robocup_2023.launch.py
      x:=-4.15 y:=2.26 yaw:=1.61 is_public_sim:=True map_path:=/maps/myfirstmap.yaml

  rviz:
    extends:
      file: .compose_templates.yml
      service: .rviz
    depends_on:
      - tiago_base

  apriltag_detection:
    extends:
      file: ros2-apriltag.yml
      service: .apriltag
    depends_on:
      - tiago_base

  moveit_wrapper:
    extends:
      file: moveit_wrapper_stud.yml
      service: moveit_wrapper
    depends_on:
      - tiago_base

  tiago_workspace:
    image: fbe-dockerreg.rwu.de/prj-iki-ros2/robots/tiago/tiago_base:sim
    extends:
      file: .compose_templates.yml
      service: .workspace_gui
    depends_on:
      - tiago_base
      - moveit_wrapper
      - apriltag_detection
    # Spawns all tags + objects, then keeps the container alive.
    # Run your solution node manually inside this container, e.g.:
    #   ros2 run clean_the_table drive_and_place
    # NOTE: The grading setup says the object will already be attached to the gripper.
    command: >
      bash -lc "
        cd /root/ros2_ws;
        colcon build --symlink-install --packages-select moveit_wrapper_interfaces clean_the_table;
        source /root/ros2_ws/install/setup.bash;
        ros2 run clean_the_table start_inspection
        cd /root/ros2_ws/src/25ws_sk-246767/models;
        python3 spawn_objects_clean_table.py &
        echo '[drive_and_place] Spawn script running. Now run: ros2 run clean_the_table drive_and_place';
        tail -f /dev/null
      "
