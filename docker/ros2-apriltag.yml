version: "3.9"

services:
  apriltag_detection:
    container_name: my_ros2_apriltag_detection
    extends:
      file: ../submodules/ros-2-apriltags/docker/docker-compose.yml
      service: apriltag_detection
    command:
      - bash
      - -c
      - |
          ros2 run apriltag_ros apriltag_node --ros-args \
            -r image_rect:=/zed2i/zed_node/rgb_raw/image_raw_color \
            -r camera_info:=/zed2i/zed_node/rgb_raw/camera_info \
            --params-file `ros2 pkg prefix apriltag_ros`/share/apriltag_ros/cfg/tags_36h11.yaml
